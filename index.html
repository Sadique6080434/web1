<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azure VM 3D Animation</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b1c2c;
      font-family: Arial;
    }

    #label {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00aaff;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div id="label">Azure Virtual Machine</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b1c2c);

  // Camera
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 5;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lights
  const light = new THREE.PointLight(0x00aaff, 2);
  light.position.set(5, 5, 5);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0x404040);
  scene.add(ambient);

  // VM Cube (Server)
  const geometry = new THREE.BoxGeometry(2, 2, 2);
  const material = new THREE.MeshStandardMaterial({
    color: 0x007fff,
    metalness: 0.7,
    roughness: 0.2
  });

  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // Glow effect
  const glowGeometry = new THREE.BoxGeometry(2.2, 2.2, 2.2);
  const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0x00aaff,
    transparent: true,
    opacity: 0.2
  });

  const glow = new THREE.Mesh(glowGeometry, glowMaterial);
  scene.add(glow);

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;

    glow.rotation.x = cube.rotation.x;
    glow.rotation.y = cube.rotation.y;

    renderer.render(scene, camera);
  }

  animate();

  // Responsive
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
